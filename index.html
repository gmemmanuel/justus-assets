<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/privacy/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Justus</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --card: #fffdf8;
        --text: #1f1f1a;
        --muted: #5f6257;
        --border: #d8d2c3;
        --accent: #1d5c47;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(29, 92, 71, 0.08), transparent 36%),
          linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
        color: var(--text);
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(560px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 20px 60px rgba(31, 31, 26, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
        line-height: 1.1;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
      }

      a {
        color: var(--accent);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Justus</h1>
      <p>You should be redirected to the privacy policy automatically.</p>
      <p>If not, open <a href="/privacy/">/privacy/</a>.</p>
    </main>
  </body>
</html>
